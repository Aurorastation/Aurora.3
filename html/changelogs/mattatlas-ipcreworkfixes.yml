################################
# Example Changelog File
#
# Note: This file, and files beginning with ".", and files that don't end in ".yml" will not be read. If you change this file, you will look really dumb.
#
# Your changelog will be merged with a master changelog. (New stuff added only, and only on the date entry for the day it was merged.)
# When it is, any changes listed below will disappear.
#
# Valid Prefixes:
#   bugfix
#     - (fixes bugs)
#   wip
#     - (work in progress)
#   qol
#     - (quality of life)
#   soundadd
#     - (adds a sound)
#   sounddel
#     - (removes a sound)
#   rscadd
#     - (adds a feature)
#   rscdel
#     - (removes a feature)
#   imageadd
#     - (adds an image or sprite)
#   imagedel
#     - (removes an image or sprite)
#   spellcheck
#     - (fixes spelling or grammar)
#   experiment
#     - (experimental change)
#   balance
#     - (balance changes)
#   code_imp
#     - (misc internal code change)
#   refactor
#     - (refactors code)
#   config
#     - (makes a change to the config files)
#   admin
#     - (makes changes to administrator tools)
#   server
#     - (miscellaneous changes to server)
#################################

# Your name.
author: MattAtlas

# Optional: Remove this file after generating master changelog.  Useful for PR changelogs that won't get used again.
delete-after: True

# Any changes you've made.  See valid prefix list above.
# INDENT WITH TWO SPACES.  NOT TABS.  SPACES.
# SCREW THIS UP AND IT WON'T WORK.
# Also, this gets changed to [] after reading.  Just remove the brackets when you add new shit.
# Please surround your changes in  double quotes ("). It works without them, but if you use certain characters it screws up compiling. The quotes will not show up in the changelog.
changes:
  - bugfix: "Synthetic external armour now deteriorates with the actual damage taken. Previously, the calculation led to the armour instead taking less damage the less it was blocked."
  - bugfix: "Fixing the synthetic endoskeleton now fixes the permanent paincrit effect on IPCs. This was caused by the self preservation status being toggled when the endoskeleton was destroyed, but it was never reset when the endoskeleton was fixed."
  - bugfix: "Species components are now added and removed properly, meaning you can switch from IPC to human and back and forth as a mercenary once more."
  - bugfix: "The Bishop internal PDA now uses your actual ID on your person as its own ID."
  - bugfix: "Fixed the endoskeleton welder repair surgery. You can do this surgery by using a welder while aiming chest and after having opened the chest fully."
  - bugfix: "The endoskeleton now takes damage from EMPs as well. This should make them A LOT more effective against IPCs."
  - qol: "The posibrain will now show up in diagnostics."
  - rscadd: "Posibrains can now be destroyed by hitting them. This will completely kill the IPC's consciousness!"
