  - bugfix: Rental bike machines no longer vend dummy keys of a type if only configured
      to sell keys of another type.
  - bugfix: Status Displays correctly display time on round start rather than attempting
      to display arrivals shuttle (and remaining blank until changed).
  - bugfix: Many, many minor improvements and bugfixes in Port Volturno based on observation
      of Event round.
  FabianK3:
  - rscadd: Added a washroom to engineering.
  - qol: Refactored the multilevel maint between engineering and medical.
  - qol: Renamed engineering EVA to engineering equipment. Area name change, doors
