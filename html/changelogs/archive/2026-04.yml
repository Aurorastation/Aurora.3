  - bugfix: Fixed camera in supermatter monitoring belonging to the wrong network.
  - bugfix: Removed the left-over unconnected vents in security meeting room.
  Fenodyree:
  - bugfix: Fixes one handed only guns having a one handed firing penalty.
  - bugfix: Fixes the one handed firing penalty not applying to short and 3 round
      bursts.
  Hellfirejag:
  - bugfix: Fixed another harddel related to observers.
