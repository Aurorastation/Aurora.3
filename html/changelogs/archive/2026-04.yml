  - bugfix: Fixed a spammy nonsense runtime error related to signals.
  - bugfix: Fixed doors with shutters not responding to clicking the tile underneath
      them.
  - bugfix: Fixed numerous hard dels that were universal to all hostile mobs.
  arrow768:
  - bugfix: Fixes being unable to change the temperature on an air alarm without unlocking
      it.
  - rscdel: Fixes missing toolbar after unlocking the air alarm.
  diggiez:
  - rscadd: Commune can now be used on adjacent objects to later send a mental image
      of their icon and examine, like a psionic Show-Held-Item
  - rscadd: With a mental image stored, Commune may be used in hand to warp and add
      custom text after its description.
