2026-04-10:
  FabianK3:
  - bugfix: Fixed uranium golems not emitting detectable radiation by geiger counters.
  - balance: Replaced arbitrary radioactivity values in a lot of things with new more
      inline radiation level defines. These balances are minor and don't effect item,
      object or material behavior.
  - rscadd: Added a new version for radioactive green glow and waste barrels, radiation
      level very high.
  - rscdel: Removed the LRP hairloss on radiation exposure.
2026-04-11:
  Hellfirejag:
  - bugfix: Fixed a hard delete related to pants.
2026-04-12:
  Fenodyree:
  - bugfix: Fixes the health doll not updating when pain goes away.
  - bugfix: Fixes robot limbs not showing in the health doll, unless they have been
      repaired.
  Hellfirejag:
  - bugfix: Fixed the ability to close airlocks by clicking on the tile underneath
      them.
  - bugfix: Fixed LED collars not emitting light when attached to clothing.
  - bugfix: Admins and CCIAA now have a universal translator for faxes, letting them
      read any fax via admin command, regardless of language markings used.
  - bugfix: Fixed the IIS module not allowing a PAI to actually do anything with a
      hardsuit.
  - bugfix: Fixed an astoundingly massive memory leak related to Instruments.
  - bugfix: Fixed color blind traits not working.
  - bugfix: Fixed projectile hit detection for point-blank situations. It's no longer
      possible to run into your own projectiles. You can take a human shield and either
      shoot through your human shield, or kill them by clicking their head.
  - bugfix: Fixed surgically removing a positronic brain deleting it and ghosting
      the player, you now correctly get a sentient cube.
  - bugfix: Fixed posibrains despawning instantly when joined as a ghostrole. They
      have souls, this is proof!
  - bugfix: Fixed implanted medical and security huds flickering.
  - rscadd: Components and Implants can now add hud elements via signals.
