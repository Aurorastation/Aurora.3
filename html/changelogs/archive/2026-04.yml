  TheGreyWolf:
  - bugfix: Fixes ID being ejected on the floor when going to cryo/residential deck.
  - rscadd: The tesla hardsuit now requires an advanced military grade tesla spine
      to use.
  - rscdel: The tesla hardsuit has been removed from the golden deep submap and replaced
