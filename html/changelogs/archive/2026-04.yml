2026-04-20:
  Batrachophrenoboocosmomachia:
  - rscadd: Adds the space sector for Assunzione, its exoplanet map, and its port
      of call, Port Volturno.
  - rscadd: Adds support for billboards to display sets of randomized ads based on
      icon_state prefixes for different worlds/locations.
  - rscadd: Adds support for 2x1 illuminated signs to be locked to a single initial
      setting.
