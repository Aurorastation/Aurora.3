  - refactor: Refactored the air alarm, atmospheric alert computer, oxygen regenerator,
      omni gas mixer, and omni gas filter from NanoUI to TGUI.
  - refactor: Updates the Library Machines to TGUI
2026-04-13:
  Batrachophrenoboocosmomachia:
  - bugfix: Fixes light and dark sensitivity trait behaviors being locked behind an
      unrelated rare prob event.
  - balance: Makes light sensitivity apply the basic low-level flash effect when triggered
      (trivial eye damage that immediately heals, very brief translucent grey overlay).
  - balance: Makes minor+ flash protection (basic sunglasses etc.) protect against
      bright lights for affected characters.
  Hellfirejag:
  - bugfix: Made a 2nd attempt to fix the instruments memory leak.
  - rscdel: Sheet Snatchers no longer flood your chat with messages.
  - bugfix: Fixed a hard delete in water effects.
  - bugfix: Fixed a memory leak related to projectiles.
  - bugfix: Finally fixed the pants memory leak. It is no longer possible to accidentally
