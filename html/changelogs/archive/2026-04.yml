      (like active magboots) when determining whether to knock people over.
  Kano:
  - rscadd: Expanded wiring guidelines to include legal multi-z wires.
  SimpleMaroon:
  - qol: Hats and other headwear are now elevated for Vaurca Workers and Warriors,
      preventing them from blocking the eyes.
  TheGreyWolf:
  - bugfix: Fixed investigator's lethal revolver ammo.
  - bugfix: Fixed the suit storage slot permitted any item in it.
2026-04-03:
  TheGreyWolf:
  - bugfix: Fixed a rat missing one handheld and one ear slot sprite.
  - bugfix: Made the RFID card slot eject ID cards when removed from a pda, such as
      when a pda explodes.
2026-04-04:
  Batrachophrenoboocosmomachia:
  - qol: Slightly increases Player Panel default window size.
  - qol: Improves some verb subcategorization, mostly for modmin verbs.
  GeneralCamo:
  - rscadd: Two sheets of cardboard can now be used to make large boxes.
2026-04-05:
  Batrachophrenoboocosmomachia:
  - balance: Halves all non-species movespeed_modifier/slowdown datums, positive and
      negative; old values were too high for the switch to smooth movement. Some additional
      tweaks on top of this.
  - balance: Movespeed modifier datums derived from chems/reagents no longer stack.
  - refactor: 'Splits the Jupiter origin into three: (''Jupiter'', ''Jupiter, Callisto'',
      ''Jupiter, Europa'').'
  - balance: Characters with the Europa origin gain the Cold Resistance and Light
      Sensitivity traits.
  - balance: Characters with the New Gibson origin gain the Cold Resistance trait.
  Fenodyree:
  - bugfix: Fixes explosions exclusively damaging the torso, and instead distributes
      damage across all limbs, with a focus on one random limb.
  Hellfirejag:
  - rscadd: Mech arms now have a chance to fail on use when damaged, which scales
      proportionally with said damage.
  - balance: Since damage to mech arms now matters, the max health of all mech arms
      has been increased by 50%.
  - balance: Nerfed Superheavy mech arms to be more in line with other Superheavy
      mech components.
  - rscadd: Mech arms and legs now have a chance to create electrical sparks when
      utilized while damaged. This provides visual and audible feedback for a mech
      being damaged.
  - rscadd: Ejecting from a mech or opening its canopy now has a chance to fail loudly
      based on how much damage its center torso has taken.
  - rscadd: Added sound effects to mechs for opening and closing hatches, toggling
      the hatch lock, and for toggling the mech's air supply.
  TheGreyWolf:
  - bugfix: Fixed mapped in disruptors not being replaced correctly.
  Yonnimer:
  - bugfix: Minor bugfixes for the voidtamer ship, including access and a missing
      powercable.
  - rscadd: Makes supermatter growthtrays a little radioactive, as a treat for Dionae.
  kermit:
  - qol: 'Light''s Edge AI Lobby Announcement: 10dB noise reduction, sample rate reduced
      to 16mHz like other AI lobby announcements'
2026-04-06:
  Batrachophrenoboocosmomachia:
  - bugfix: Fixes Callistean and Europan origins not being listed for Sol compatibility.
  Yonnimer:
  - balance: Gives Geras Dionae a general speed buff, taking them from 2.2x slower
      than humans to about 1.5, or a little faster than G2S.
2026-04-07:
  Kano:
  - rscadd: Added whiteboards, sprites by KingOfThePing.
  - qol: Gave barsigns and its subtypes a tgui menu.
2026-04-08:
  FabianK3:
  - rscadd: Extended the maint between ops and medical into the public hallway. This
      drastically shortens the way to starboard-aft maint areas from the center of
      the ship.
  Fenodyree:
  - bugfix: Fixes projectile piercing, some rifle bullets and most ship-weapons will
      now pierce through most things.
  - bugfix: Fixes laser shotguns having no dispersion.
  - bugfix: Fixes laser shotguns having no delay between shots.
  - bugfix: Fixes mod laser bluespace capacitors not teleporting you.
  - bugfix: Fixes mod laser phoron capacitors not hurting when they explode.
  - bugfix: Fixes mod laser malfunction messages not displaying.
  - bugfix: Fixes mod laser wielded firedelay.
  - bugfix: Fixes being able to spam click to repair mod laser components.
  - bugfix: Fixes being able to attempt a repair on undamaged components.
  - bugfix: Fixes the weapons analyzer to correctly display damage on burst fire weapons.
  - bugfix: The power capacity of the modlasers is no longer multiplied by the shot
      count. Instead burst fire reduces power cost.
  - bugfix: Capacitors no longer get deleted when at reliability 0 as this broke all
      other components. You can keep shooting until it kills you.
  - rscadd: Adds new messages for mod laser malfunctions, visible to everyone nearby.
  - rscadd: Adds a locker that spawns with boxes of mod laser components, mostly for
      testing purposes.
  - balance: Modifiers no longer break immediately, they instead degrade over multiple
      shots.
  - balance: Makes mod laser lenses repairable with glass or reinforced glass.
  - balance: Adds an electric shock on all minor capacitor failures, as an instant
      consequence, radiation was too slow to affect an in progress fight.
  - balance: Adds a direct damage component to phoron capacitor overloads, if the
      gun is being held.
  - balance: Reduces the damage of mod laser blasters by 20%, cuts their AP in half
      and halves the firestacks they cause.
  - balance: Critical capacitor failures are now very dangerous, probably deadly without
      apporiate protection or medical help.
  Hellfirejag:
  - bugfix: Fixed a hard del related to grem larva.
  - bugfix: Fixed grem larva having no delay when attempting to flee into a vent.
  - bugfix: Fixed a hard deleted related to ghost observers.
  - bugfix: Fixed a hard del related to limbs being deleted in the wrong order.
  fyni:
  - bugfix: Fixes the sprites for the laser rifle by adding the drained states
  - bugfix: Fixes the PRA Submarine Coat closed state not working by removing six
      letters from the sprite sheet. Whoops!
  - rscadd: Adds the PRA submarine coat, available in the loadout for Tajara characters.
2026-04-09:
  Arbiterambrose:
  - bugfix: Fixed Vaurca and Skrell hardsuits not spawning in operative crates.
  - balance: Added belt and back slot as choices for the thermal blade.
  CatsinHD:
  - rscadd: Added Kalkii Dynhvah's custom item.
  Fenodyree:
  - bugfix: Fixes flashbangs not damaging the hand they explode in.
  Hellfirejag:
  - bugfix: Fixed a hard del related to freelook cameras.
  - bugfix: Fixed a hard delete related to telescience portals.
  - bugfix: Fixed some hard dels related to Destroy() procs triggering in the wrong
