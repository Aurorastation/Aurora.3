2026-03-17:
  Batrachophrenoboocosmomachia:
  - bugfix: Resolves some lingering weird behavior with emergency shield projectors
      with regards to power draw.
  - bugfix: Updates Warding Spheres, Luminous Sceptres, and Azubarre Torches to correctly
