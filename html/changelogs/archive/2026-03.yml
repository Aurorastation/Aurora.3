2026-03-05:
  CatsinHD:
  - bugfix: Fixes stickynotes adding papers to the noticeboard despite not being able
      to be added to one.
  Evandorf:
  - rscadd: Standardizes the airlocks in all shuttles by adding manual shutters to
      the Spark, Quark, and Canary. This also coincides with changes to SoP - Preflight
      Safety Checks.
  Hellfirejag:
  - balance: Balance pass for 'damaged movement delays' and movement types in general
      for mech legs to make them less punishing. Quad mechs now uniquely don't have
      a strafe delay. Combat mechs and heavier mechs are in general more resistant
      to losing movespeed from damage.
  - rscadd: Cult mechs now have a unique mechanic where their movement speed increases
      as they take damage. For the Dark Gods!
  - bugfix: Fixed mechs not having correct glide sizes for smooth movement when strafing
      and reversing.
  JohnWildkins:
  - rscadd: Added a debug command for devs/admins to list timer sources.
  - bugfix: Fixed an issue where Extended wouldn't be selected if no votes for gamemode
      were cast.
  - code_imp: PRs can now correctly ignore CI runs or just unit tests with [CI Ignore]
      and [UT Ignore] respectively.
  Timby:
  - imageadd: Changes the camera sprites to not be so r4407. Resultantly changes the
      ever-popular camera gun's sprite.
  - imagedel: Old camera and camera gun sprites are gone.
2026-03-06:
  GeneralCamo:
  - rscadd: Added bicaridine, dermaline, and tricordrazine to the cargo order interface.
  - balance: Dermaline and butazoline are now priced as premium medicines.
  - rscadd: The Horizon's medical bay now starts with a single bottle of bicaridine,
      kelotane, and dexalin.
  - rscadd: Smartfridges now have emissive masks.
  fyni:
  - rscadd: Adds a sign for the commissary - Quik Stop, by Orion.
2026-03-08:
  ElorgRHG:
  - rscdel: Consular Officers no longer start with a corporate tie and a corporate
      badge.
  - rscadd: Added citizenship loadout restrictions to the loadout.
  - rscadd: Dominian Consular loadout items are now citizenship restricted to the
