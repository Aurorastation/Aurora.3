      to write them. Add _small to make small versions.
  - rscadd: Adhomaian tajara can now select Biesel citizenship to represent those
      who immigrated there as an adult.
  JohnWildkins:
  - bugfix: Fix issue whereby Tajara would lose movement speed due to lowering their
      body temperature.
  fyni:
  - rscadd: Adds three new Domi house banners!
2026-03-09:
  MattAtlas:
  - bugfix: Fixes admin announces sanitizing HTML, meaning that admins can terrorize
      you with big red text once more.
2026-03-10:
  Batrachophrenoboocosmomachia:
  - balance: Reduces flashlight power consumption by 10x globally.
  JohnWildkins:
  - refactor: Ported object duplication handling from /tg/ to fix holodeck generating
      massive lag spikes.
  - refactor: Refactored weather, turrets, and overmap contacts to not use timers
      to reduce the number created + deleted over a round substantially.
  MattAtlas:
  - refactor: Laying down no longer exists as a separate movement intent, you can
      now simply rest with your weapon in your hand. Middle clicking the walk/run
      intent icon now functions as a rest macro.
2026-03-11:
  FabianK3:
  - bugfix: Fixed material stacks being able to have negative amounts.
  MattAtlas:
  - bugfix: Fixes paincrit (or incapacitation in general) not making people drop what
      they're holding.
2026-03-12:
  Batrachophrenoboocosmomachia:
  - rscadd: Adds a recharge station and three cold packs to the Himean Patrol Ship.
  - imageadd: Adds +bolted, +welded, +lights overlays to several large machines for
      easier visual identification of whether or not clicking on that emitter will
      kill you or not, etc.
  - imageadd: Modifies the base of the Shield Wall Generator sprite to better match
      that of the Emergency Shield Projector (and so they can use the same overlays
      mentioned above).
  - imageadd: Tweaks the Emitter's directional sprites slightly so that the base doesn't
      seem to change shape quite so drastically when rotated.
  - imageadd: Ports very pretty space heater sprites made by Wallemations and vinylspiders
      from /tg/.
  - imageadd: Adds unique sprites for Old and Heavy-Duty power cells.
  - balance: Increases power draw and range of Emergency Shield Projectors.
  - balance: Increases power draw of Shield Wall Generators.
  - balance: Greatly reduces time for debugger to fix APCs corrupted by electrical
      storms.
  - balance: Increases multi-z shield capacitor reserve charge and maximum throughput,
      so that high-strength shields can actually be run (at high power draw).
  - balance: Tweaks the INDRA power output formula to scale better with increasing
      temperature.
  - balance: Slight adjustments to space heater efficiency formula with a friendly
      handwave to entropy.
  - balance: Old power cells have a 5% chance to be defective and have slightly lower
      maxcharge than standard cells.
  - qol: Adds extended examine hints to engineering objects.
  - qol: Extends list of object types which INDRA core field will interact peacefully
      with.
  - qol: Improved space heater UX (chat msgs changed to balloon alerts, audible feedback,
      etc.)
  - code_imp: Updates many code comments to use DMdocs.
  - code_imp: Consolidates various shield generation machine sprites in scattered
      across multiple files into a single shield generator machines sprite file.
  - bugfix: Fixes Emergency Shield Projector hard del issue.
  - bugfix: Emergency Shield Projector now shuts down as intended if the area's APC
      gets completely drained.
  - bugfix: Firing the gyrotron into the INDRA while no reactants are present will
      no longer generate heat.
  - bugfix: Fixes INDRA runtime.
  - bugfix: Fixes Power Monitoring app not displaying grid sensors when run from a
      modular computer held in-hand.
  ElorgRHG:
  - rscadd: 'Added two new tajaran loadout options: pants and skirts + shirts. Summer
      pants and dress (renamed to skirt) have been put there.'
  - bugfix: The tajaran summer dress and pants have been made into pants slot items
      and should now display properly.
  GeneralCamo:
  - bugfix: Balloon Alerts no longer blend improperly, giving them weird transparency.
  - bugfix: Fixed floor tiles showing their quantity when not held.
  KingOfThePing:
  - rscadd: Returns a selection of alternative job titles to the engineering department.
