  - bugfix: Fixed a couple of hardcoded tool interactions to use tool behavior instead.
  - bugfix: Fixes pda lights not working.
  - bugfix: Fixes the cargo tug lights.
  - rscadd: Organ bounties now require the organs to be organic.
  - bugfix: Fixed the chem codex searching.
  - bugfix: Fixed the oversized icons in the faction selection screen.
  - bugfix: Fixed the bugged search function in the cooking codex.
  - bugfix: Fixed potential duplicate and entries not being removed in the cooking
      codex and cargo programs.
  Wowzewow (Wezzy):
  - bugfix: Crowbars are just called crowbars now. The old name 'pocket crowbar' has
      been removed. Because they can't fit in pockets.
  diggiez:
  - bugfix: The No Breathe Trait works, and Runtime's shuttle area requires power.
  fyni:
  - rscadd: Adds the Caria origin, by request of human lore. Carians are vulnrable
