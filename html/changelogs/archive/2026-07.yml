2026-07-18:
  Batrachophrenoboocosmomachia:
  - rscadd: Adds Seizure and Heart Attack buttons to the Damage Menu.
  - rscadd: Adds tooltips to several buttons in the Damage Menu.
  Fenodyree:
  - bugfix: Fixed the Retract All Hardsuit Parts verb, by making hardsuit boots retractable
      with the chestpiece deployed, at a heavy slowdown
  - bugfix: Fixed the stealth system module not decloaking when the user fires a gun
      or hits a mob.
  - bugfix: Fixed being able to instantly remove your hardsuit if it had a storage
      module in it.
  - bugfix: Fixed mounted energy guns being stuck in taser mode. Also extends support
