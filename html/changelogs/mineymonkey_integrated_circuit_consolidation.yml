author: mineymonkey

delete-after: True

changes:
  - rscadd: "Added 4-way and 8-way number-to-string integrated circuit converters."
  - rscadd: "Added a circuit cloner upgrade disk for the integrated circuit printer."
  - rscadd: "Added integrated circuit printer support for scanning assemblies into a cloning buffer."
  - rscadd: "Added integrated circuit printer support for exporting scanned assemblies as blueprint text."
  - rscadd: "Added integrated circuit printer support for importing cloning blueprint text."
  - rscadd: "Added integrated circuit printer support for printing cloned assemblies from either a scanned assembly or an imported blueprint."
  - rscadd: "Added phoron costs and phoron storage to the integrated circuit printer."
  - rscadd: "Added a non-removable built-in power network interface to large and wall-mounted electronic assemblies."
  - rscadd: "Added an electronic radio headset assembly."
  - rscadd: "Electronic radio headsets now function as wearable radios while also accepting integrated circuits."
  - rscadd: "Electronic radio headsets now accept encryption keys."
  - rscadd: "Electronic radio headsets can relay received radio speech into installed microphone circuits."
  - rscadd: "Text-to-speech circuits installed inside electronic radio headsets now output privately to the wearer."
  - qol: "Added search support to the integrated circuit printer interface."
  - qol: "Integrated circuit printer search now filters by category and circuit name."
  - qol: "Updated the integrated circuit printer interface to show cloning status, clone costs, print time, blueprint state, and relevant clone controls."
  - qol: "Changed the integrated circuit printer to normal weight class."
  - qol: "Changed the integrated circuit output printer circuit to normal weight class."
  - qol: "Changed the advanced medical analyser circuit damage, radiation, and genetic instability outputs to severity text."
  - qol: "Closed electronic assemblies now list installed circuits on examine."
  - qol: "Electronic radio headsets now have an equipped verb and AltClick access path for their internal circuit assembly."
  - bugfix: "Electronic assemblies no longer open the internal circuit UI when examined while closed."
  - bugfix: "Anchored electronic assemblies can no longer be picked up."
  - bugfix: "Closed anchored electronic assemblies still allow external input circuits such as buttons and text pads to be used."
  - bugfix: "Opened anchored electronic assemblies now correctly open the internal circuit UI."
  - bugfix: "Built-in integrated circuits are no longer cloned, exported, or costed as removable circuits."
  - bugfix: "Cloned assemblies now preserve removable circuit names, pin data, constant memory values, and pin links."
  - bugfix: "Cloning blueprints now skip non-removable built-in circuits while preserving the cloned assembly's own built-ins."
  - bugfix: "Wall-mounted electronic assemblies now correctly inherit built-in power network behavior."
  - bugfix: "Electronic radio headset sprites now update when the internal circuit panel is opened or closed."
  - bugfix: "Electronic radio headsets now stop listening when dropped."
  - bugfix: "Microphone circuits now use a shared intake path for local speech and electronic radio headset relay."
  - bugfix: "Text-to-speech circuits outside electronic radio headsets retain normal audible output behavior."
