author: mineymonkey

delete-after: True

changes:
  - rscadd: "Added electronic radio headsets."
  - rscadd: "Electronic radio headsets function as wearable radios while also accepting integrated circuits."
  - rscadd: "Electronic radio headsets accept encryption keys."
  - rscadd: "Electronic radio headsets include an internal clothing-sized electronic assembly."
  - rscadd: "Electronic radio headsets can be opened with a crowbar for internal circuit access."
  - rscadd: "Electronic radio headsets provide an equipped verb and AltClick access path for their internal circuit assembly."
  - rscadd: "Text-to-speech circuits installed inside electronic radio headsets now output privately to the wearer."
  - rscadd: "Added electronic radio headset cloning support to the integrated circuit printer."
  - rscadd: "Added hosted assembly blueprint support for electronic radio headset cloning."
  - bugfix: "Made it possible to actually clone the electronic radio headset and made the examine fix work on the headset using feedback_hints."
  - rscadd: "Cloning blueprints can now store a host_type for items that contain an internal electronic assembly."
  - rscadd: "Imported electronic radio headset blueprints now print the headset item instead of only the internal assembly."
  - rscadd: "Added a database server circuit."
  - rscadd: "Added a database client circuit."
  - rscadd: "Added a database counter client circuit."
  - rscadd: "Added a database command pad circuit for parsing typed database commands."
  - rscadd: "Database command pads support READ/GET and WRITE/SET style command workflows."
  - rscadd: "Database command pads output parsed command, parsed key, parsed value, response, status, and success state."
  - rscadd: "Added a radio command receiver circuit for parsing relayed command text."
  - rscadd: "Radio command receivers output speaker, message, channel, command, arguments, argument list, and payload."
  - rscadd: "Added ID card reader circuit support."
  - rscadd: "Added access checker circuit support."
  - rscadd: "Added reference validator circuit support."
  - rscadd: "Added distance checker circuit support."
  - rscadd: "Added direction-to-reference circuit support."
  - rscadd: "Added area scanner circuit support."
  - rscadd: "Added paper tray insert slot circuit."
  - rscadd: "Added beaker holder insert slot circuit."
  - rscadd: "Added ID card slot insert circuit."
  - rscadd: "Added generic card slot insert circuit."
  - rscadd: "Added power cell slot insert circuit."
  - rscadd: "Added storage slot insert circuit."
  - rscadd: "Added tool slot insert circuit."
  - rscadd: "Added general item tray insert circuit."
  - rscadd: "Added 4-way and 8-way write circuits."
  - rscadd: "Added additional list utility circuits."
  - rscadd: "Added command parsing utility circuits."
  - rscadd: "Added additional string and number conversion utility circuits."
  - rscadd: "Added coordinate navigation and coordinate command parsing circuits."
  - rscadd: "Added xenoarch precision excavator circuit support."
  - rscadd: "Added xenoarch excavation outputs for anomaly depth, clearance, current depth, safe remaining depth, excavation amount, and target direction."
  - rscadd: "Added additional manipulation circuits from baystation."
  - rscadd: "Added an additional debug circuit that has 0 complexity, but 1 size. Basically only works to allow better organize circuits."
  - rscadd: "Added an append ability for importing JSON files for circuit cloning as the limit appears to be 30000 characters, but a max cap machine (100 circuits) is likely to go past that easily"
  - rscadd: "Actually made the cloner disk printable in the prolathe woops."
  - qol: "Improved integrated circuit printer cloning support for hosted internal assemblies."
  - qol: "Improved electronic radio headset cloning so cloned headsets keep their internal assembly bound to the headset."
  - qol: "Improved cloned headset setup for internal assembly ownership, clothing reference, action button state, and sprite updates."
  - qol: "Improved cloned circuit preservation for removable circuit names, pin data, constant memory values, and pin links."
  - qol: "Improved database command pad feedback for invalid commands and missing command arguments."
  - qol: "Improved server-terminal workflows using text pad, database command pad, database client, database server, and screen output circuits."
  - qol: "Updated body temperature from kelvin to celcius in the IC med/adv med scanner."
  - qol: "Changed examiner to allow it to view items on its turf, aka inside a circuit"
  - qol: "Updated ID slot to allow it to be used as a locking mechanism for circuits instead of just a chuddly holder only."
  - bugfix: "Fixed electronic radio headset blueprints printing only a loose internal clothing assembly."
  - bugfix: "Fixed imported electronic radio headset blueprints failing to recreate the headset wrapper item."
  - bugfix: "Fixed electronic radio headset cloning rebinding issues with internal assemblies."
  - bugfix: "Fixed cloned hosted assemblies not correctly restoring their internal circuit ownership."
  - bugfix: "Fixed duplicate printer blueprint reconstruction logic."
  - bugfix: "Fixed duplicate printer blueprint serialization logic."
  - bugfix: "Fixed radio command receiver input declaration formatting."
  - bugfix: "Fixed integrated hypo-injector delayed injection behavior using a timer callback instead of sleeping in do_work."
  - bugfix: "Fixed injector failure handling for invalid, empty, non-adjacent, or non-injectable targets."
  - bugfix: "Best one I can think of? Basically removed the spawn flags for /obj/item/integrated_circuit/input/radio_command_receiver because it literally has zero use besides being in the electronic headset item, and well that's already built into it."
